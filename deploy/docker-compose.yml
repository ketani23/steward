# Steward development stack
# PostgreSQL + pgvector for memory and audit logging

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: steward
      POSTGRES_PASSWORD: steward_dev
      POSTGRES_DB: steward_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steward"]
      interval: 10s
      timeout: 5s
      retries: 5

  steward:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://steward:steward_dev@postgres:5432/steward_dev
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      STEWARD_CONFIG_DIR: /etc/steward/config
      STEWARD_HOST: 0.0.0.0
      STEWARD_PORT: 8080
      STEWARD_LOG_FORMAT: json
      RUST_LOG: steward=info
      # WhatsApp (optional — set these to enable)
      # WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      # WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      # WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      # WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      # Telegram (optional — set these to enable)
      # TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      # TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS}
      # TELEGRAM_API_BASE_URL: https://api.telegram.org
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
