# Steward production stack
# PostgreSQL + pgvector for memory and audit logging

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-steward}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-steward}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - steward-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-steward}"]
      interval: 10s
      timeout: 5s
      retries: 5

  steward:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-steward}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-steward}
      STEWARD_CONFIG_DIR: /etc/steward/config
      STEWARD_HOST: 0.0.0.0
      STEWARD_PORT: 8080
    read_only: true
    tmpfs:
      - /tmp/workspace:size=256M,uid=10001,gid=10001
      - /tmp:size=64M,uid=10001,gid=10001
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - steward-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  steward-net:
    driver: bridge

volumes:
  pgdata:
