name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Codex Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Codex
        run: npm install -g @openai/codex

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff

      - name: Run Codex review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEW=$(codex exec "You are a senior Rust engineer reviewing a PR for Steward, a security-hardened AI agent framework. Review this diff for: 1) Security issues 2) Rust best practices 3) Logic bugs 4) Missing tests 5) API design concerns. Be concise, flag only real issues. Format as markdown grouped by category.

          $(cat /tmp/pr.diff)")

          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "## 🤖 Codex Code Review

          $REVIEW

          ---
          *Reviewed by OpenAI Codex*"
